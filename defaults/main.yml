# defaults file for ansible-role-k8s-provisioning

k8s_provisioning_kubectl_user: "{{ ansible_user_id }}"

k8s_provisioning_folders:
- /conf/default
- /conf/monitoring
- /data/default
- /data/monitoring
- /temp/default
- /temp/monitoring

k8s_provisioning_gpu: false

k8s_provisioning_cert_refresh_log: /tmp/microk8s.refresh-certs.log

k8s_provisioning_package_list_snap:
- name: kustomize
  classic: true
