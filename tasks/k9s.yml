- name: Get latest k9s release info from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/derailed/k9s/releases/latest
    return_content: true
  register: k9s_release

- name: Get installed k9s version
  ansible.builtin.command:
    cmd: k9s version --short
  register: k9s_installed
  changed_when: false
  failed_when: false

- name: Set k9s facts
  ansible.builtin.set_fact:
    k9s_deb_url: "{{ k9s_release.json.assets | selectattr('name', 'search', 'linux_amd64.deb') | map(attribute='browser_download_url') | first }}"
    k9s_latest_version: "{{ k9s_release.json.tag_name }}"

- name: Download k9s .deb package
  ansible.builtin.get_url:
    url: "{{ k9s_deb_url }}"
    dest: /tmp/k9s.deb
    mode: '0644'
  when: k9s_latest_version not in (k9s_installed.stdout | default(''))

- name: Install k9s via dpkg
  ansible.builtin.apt:
    deb: /tmp/k9s.deb
    state: present
  when: k9s_latest_version not in (k9s_installed.stdout | default(''))
