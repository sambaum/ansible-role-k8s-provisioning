- name: Install nvidia drivers
  ansible.builtin.package:
    name:
    - nvidia-headless-535-server
    - nvidia-utils-535-server
    state: present

- name: Check if NVIDIA GPU device is present
  ansible.builtin.stat:
    path: /dev/nvidia0
  register: nvidia_device

- name: Set NVIDIA persistence mode
  ansible.builtin.shell:
    cmd: nvidia-smi --persistence-mode=ENABLED
  changed_when: true
  when: nvidia_device.stat.exists
